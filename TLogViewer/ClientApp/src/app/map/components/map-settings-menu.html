<div class="map-settings">
  <p class="map-settings__title">Map display</p>

  <label class="map-settings__option map-settings__option--gps-source">
    <span class="map-settings__gps-source-label">GPS source</span>
    <select
      class="map-settings__select map-settings__select--gps"
      (change)="onGpsSourceChange($any($event.target).value)"
      aria-label="GPS source"
    >
      @for (option of gpsSourceOptions; track option.value) {
        <option [value]="option.value" [selected]="draftGpsSource() === option.value">
          {{ option.label }}
        </option>
      }
    </select>
  </label>

  <label class="map-settings__option">
    <input
      type="checkbox"
      [checked]="draftHeading()"
      (change)="onDisplayHeadingChange($any($event.target).checked)"
    />
    <span>Display heading</span>
    <span class="map-settings__swatch map-settings__swatch--heading" aria-hidden="true"></span>
  </label>

  <label class="map-settings__option">
    <input
      type="checkbox"
      [checked]="draftTargetPath()"
      (change)="onDisplayTargetPathChange($any($event.target).checked)"
    />
    <span>Display target path</span>
    <span class="map-settings__swatch map-settings__swatch--target" aria-hidden="true"></span>
  </label>

  <label class="map-settings__option">
    <input
      type="checkbox"
      [checked]="draftWind()"
      (change)="onDisplayWindChange($any($event.target).checked)"
    />
    <span>Display wind</span>
    <span class="map-settings__swatch map-settings__swatch--wind" aria-hidden="true">
      <span class="map-settings__swatch-line"></span>
      <span class="map-settings__swatch-arrow"></span>
    </span>
  </label>

  <label class="map-settings__option">
    <input
      type="checkbox"
      [checked]="draftTrail()"
      (change)="onDisplayTrailChange($any($event.target).checked)"
    />
    <span>Display trail</span>
  </label>

  <label class="map-settings__option map-settings__option--nested">
    <input
      type="checkbox"
      [checked]="draftFullTrail()"
      [disabled]="!draftTrail()"
      (change)="onDisplayFullTrailChange($any($event.target).checked)"
    />
    <span>Full flight trail</span>
  </label>
  <p class="map-settings__note">
    Showing the full flight trail may seriously affect performance on long logs.
  </p>

  <label class="map-settings__option map-settings__option--trail-length">
    <span class="map-settings__trail-length-label">Trail length</span>
    <select
      class="map-settings__select"
      [disabled]="!draftTrail() || draftFullTrail()"
      (change)="onTrailLengthChange($any($event.target).value)"
      aria-label="Trail length"
    >
      @for (option of trailLengthOptions; track option.seconds) {
        <option
          [value]="option.seconds"
          [selected]="draftTrailLengthSeconds() === option.seconds"
        >
          {{ option.label }}
        </option>
      }
    </select>
  </label>
</div>
