<div
  class="flight-player"
  [class.flight-player--disabled]="!hasPlayback()"
  role="group"
  aria-label="Flight playback"
>
  <div class="flight-player__controls">
    <button
      type="button"
      class="flight-player__btn"
      (click)="togglePlay()"
      [disabled]="!hasPlayback()"
      [attr.aria-label]="playing() ? 'Pause' : 'Play'"
    >
      @if (playing()) {
        <span class="flight-player__icon flight-player__icon--pause" aria-hidden="true"></span>
      } @else {
        <span class="flight-player__icon flight-player__icon--play" aria-hidden="true"></span>
      }
    </button>

    <button
      type="button"
      class="flight-player__btn"
      (click)="forward()"
      [disabled]="!hasPlayback()"
      [attr.aria-label]="'Forward ' + forwardPercent + '%'"
    >
      <span class="flight-player__icon flight-player__icon--forward" aria-hidden="true"></span>
    </button>

    <div class="flight-player__speed-wrap">
      <app-dropdown
        [options]="speedOptions"
        [value]="speedValue()"
        (valueChange)="onSpeedChange($event)"
        [openUpward]="true"
        [disabled]="!hasPlayback()"
        placeholder="Speed"
        ariaLabel="Playback speed"
      />
    </div>
  </div>

  <div class="flight-player__timeline">
    <span class="flight-player__percent">{{ progressLabel() }}</span>
    <div class="flight-player__track">
      <div class="flight-player__markers">
        @for (marker of modeChangeMarkers(); track marker.changedAtMs) {
          <button
            type="button"
            class="flight-player__marker"
            [style.left.%]="marker.percent"
            [attr.aria-label]="'FLT MODE: ' + marker.label"
            (click)="seekToModeMarker(marker.changedAtMs)"
          >
            <span class="flight-player__marker-tick" aria-hidden="true"></span>
            <span class="flight-player__marker-popup" role="tooltip">
              FLT MODE: {{ marker.label }}
            </span>
          </button>
        }
        @for (marker of armChangeMarkers(); track marker.changedAtMs) {
          <button
            type="button"
            class="flight-player__marker flight-player__marker--arm"
            [class.flight-player__marker--armed]="marker.armed"
            [class.flight-player__marker--disarmed]="!marker.armed"
            [style.left.%]="marker.percent"
            [attr.aria-label]="marker.label"
            (click)="seekToArmMarker(marker.changedAtMs)"
          >
            <span class="flight-player__marker-tick" aria-hidden="true"></span>
            <span class="flight-player__marker-popup" role="tooltip">
              {{ marker.label }}
            </span>
          </button>
        }
      </div>
      <input
        type="range"
        class="flight-player__slider"
        min="0"
        max="100"
        step="0.1"
        [value]="progressPercent()"
        [disabled]="!hasPlayback()"
        (input)="onSliderInput($event)"
        aria-label="Flight progress"
      />
    </div>
    <span class="flight-player__percent">{{ endLabel() }}</span>
  </div>
</div>
