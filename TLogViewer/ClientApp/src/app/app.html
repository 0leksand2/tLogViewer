<div class="app-shell" [class.app-shell--menu-open]="menuOpen()">
  <app-map class="app-shell__map" />
  <app-side-menu
    [(open)]="menuOpen"
    [selectedProperties]="orderedSelectedProperties()"
    (openProperties)="openPropertiesModal()"
    (propertiesReordered)="onPropertiesReordered($event)"
  />

  <app-modal
    title="Mission Planner Properties"
    [(open)]="propertiesModalOpen"
    size="wide"
    (saved)="onPropertiesSaved($event)"
    (cancelled)="onPropertiesCancelled()"
  >
    @if (propertiesModalOpen()) {
      <app-mission-planner-properties [selectedKeys]="selectedPropertyKeys()" />
    }
  </app-modal>

  <app-modal
    title="Display settings"
    [(open)]="settingsModalOpen"
    (saved)="onSettingsSaved($event)"
    (cancelled)="onSettingsCancelled()"
  >
    @if (settingsModalOpen()) {
      <app-map-settings-menu
        [displayHeading]="displayHeading()"
        [displayTargetPath]="displayTargetPath()"
        [displayWind]="displayWind()"
        [displayTrail]="displayTrail()"
        [displayFullTrail]="displayFullTrail()"
        [trailLengthSeconds]="trailLengthSeconds()"
      />
    }
  </app-modal>

  <app-modal
    title="Map display help"
    [(open)]="helpModalOpen"
    saveLabel="Close"
    [showCancel]="false"
    (saved)="onHelpClosed()"
    (cancelled)="onHelpClosed()"
  >
    @if (helpModalOpen()) {
      <app-map-display-help />
    }
  </app-modal>

  <div class="app-shell__toolbar">
    @if (flightOptions().length > 0) {
      <app-dropdown
        [(value)]="selectedFlightId"
        [options]="flightOptions()"
        placeholder="Select flight"
        ariaLabel="Select flight"
      />
    }
    <app-tlog-load-menu (uploaded)="onTlogUploaded($event)" />
    <button
      type="button"
      class="app-shell__toolbar-btn app-shell__toolbar-btn--icon"
      (click)="openSettingsModal()"
      aria-label="Open display settings"
      title="Settings"
    >
      <img src="assets/icons/gear.png" alt="" width="18" height="18" />
    </button>
    <button
      type="button"
      class="app-shell__toolbar-btn app-shell__toolbar-btn--icon"
      (click)="openHelpModal()"
      aria-label="Open map display help"
      title="Help"
    >
      <img src="assets/icons/info.png" alt="" width="18" height="18" />
    </button>
  </div>

  <div class="app-shell__player">
    <app-flight-player
      [playbackPoints]="playbackPoints()"
      [durationSeconds]="selectedFlightDuration()"
      [(progressPercent)]="flightProgressPercent"
      [(playing)]="flightPlaying"
      [(playbackSpeed)]="flightPlaybackSpeed"
    />
  </div>
</div>
