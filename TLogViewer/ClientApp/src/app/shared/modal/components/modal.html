@if (open()) {
  <div class="modal" role="presentation">
    <button
      type="button"
      class="modal__backdrop"
      aria-label="Close dialog"
      (click)="onBackdropClick()"
    ></button>

    <div
      class="modal__dialog"
      [class.modal__dialog--wide]="size() === 'wide'"
      [class.modal__dialog--xl]="size() === 'xl'"
      role="dialog"
      aria-modal="true"
      [attr.aria-label]="title() || 'Dialog'"
    >
      <header class="modal__header">
        <h2 class="modal__title">{{ title() }}</h2>
        <button type="button" class="modal__close" aria-label="Close" (click)="onCancel()">
          &times;
        </button>
      </header>

      <div class="modal__body">
        <ng-content />
      </div>

      <footer class="modal__footer">
        @if (showCancel()) {
          <button type="button" class="modal__btn modal__btn--secondary" (click)="onCancel()">
            {{ cancelLabel() }}
          </button>
        }
        <button type="button" class="modal__btn modal__btn--primary" (click)="onSave()">
          {{ saveLabel() }}
        </button>
      </footer>
    </div>
  </div>
}
