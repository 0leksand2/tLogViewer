@if (visible()) {
  <div
    class="spinner-overlay"
    role="status"
    aria-live="polite"
    aria-busy="true"
    [attr.aria-label]="message()"
  >
    <div
      class="spinner__stage"
      aria-hidden="true"
      [style.--spinner-icon-size.px]="iconSizePx()"
    >
      <img
        class="spinner__icon"
        [src]="iconSrc()"
        [width]="iconSizePx()"
        [height]="iconSizePx()"
        alt=""
      />
    </div>
    @if (message()) {
      <p class="spinner__message">{{ message() }}</p>
    }
  </div>
}
